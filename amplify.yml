version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        # Write all NEXT_PUBLIC_ vars to .env.production (client-side + SSR)
        - env | grep -e NEXT_PUBLIC_ >> .env.production || true
        # Write server-side secrets to .env.production (required for SSR runtime)
        - env | grep -e CLERK_SECRET_KEY >> .env.production || true
        - env | grep -e CLERK_WEBHOOK_SIGNING_SECRET >> .env.production || true
        - env | grep -e DATABASE_URL >> .env.production || true
        - env | grep -e AZURE_AI_API_KEY >> .env.production || true
        - env | grep -e AZURE_AI_RESOURCE >> .env.production || true
        - env | grep -e PAYPAL_CLIENT_SECRET >> .env.production || true
        - env | grep -e PAYPAL_WEBHOOK_ID >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
