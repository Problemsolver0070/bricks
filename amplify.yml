version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        # Write env vars to .env.production so the Node.js SSR runtime can
        # read them (API routes, server components, server actions).
        # Edge middleware vars are inlined via next.config.ts `env` instead.
        - |
          printenv | grep -E '^(NEXT_PUBLIC_|CLERK_SECRET_KEY|CLERK_WEBHOOK_SIGNING_SECRET|DATABASE_URL|AZURE_AI_API_KEY|AZURE_AI_RESOURCE|PAYPAL_CLIENT_SECRET|PAYPAL_WEBHOOK_ID)' > .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
