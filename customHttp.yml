        value: "no-cache"
  - pattern: "/pricing"
    headers:
      - key: "Cache-Control"
        value: "private, no-cache, no-store, max-age=0, s-maxage=0, must-revalidate"
      - key: "Pragma"
        value: "no-cache"
  - pattern: "/api/*"
    headers:
      - key: "Cache-Control"
        value: "private, no-cache, no-store, max-age=0, s-maxage=0, must-revalidate"
      - key: "Pragma"
        value: "no-cache"
